<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epoch — Countdown Timer</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Barlow',sans-serif;min-height:100vh;background:#08080f;display:flex;flex-direction:column;align-items:center;padding:clamp(1.5rem,4vw,3rem) clamp(1rem,3vw,2rem);color:#fff;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(100,80,255,.22) 0%,transparent 65%)}
/* TITLE */
.title-area{text-align:center;margin-bottom:clamp(2rem,4vh,3rem);animation:up .6s both}
.ev-label{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.7rem}
.ev-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,4.5rem);letter-spacing:.05em;line-height:1;background:linear-gradient(135deg,#fff,#b4a8f8);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ev-date{font-size:.8rem;color:rgba(255,255,255,.35);margin-top:.4rem}
.ev-date strong{color:#b4a8f8}
/* COUNTDOWN BOXES */
.countdown{display:flex;gap:clamp(.6rem,2vw,1.4rem);margin-bottom:clamp(1.5rem,3vh,2.5rem);align-items:flex-start;animation:up .6s .1s both;flex-wrap:wrap;justify-content:center}
.unit-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.unit-box{position:relative;width:clamp(72px,17vw,110px);height:clamp(78px,18vw,118px);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 20px 40px rgba(0,0,0,.3);overflow:hidden}
.unit-box::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(0,0,0,.4)}
.unit-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,4.2rem);letter-spacing:.02em;line-height:1;background:linear-gradient(180deg,#fff 40%,rgba(255,255,255,.6));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.unit-lbl{font-size:clamp(.55rem,.9vw,.65rem);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.sep{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.2rem);color:rgba(255,255,255,.18);padding-top:.8rem;align-self:flex-start}
/* RINGS */
.rings{display:flex;gap:clamp(1.5rem,3vw,3rem);margin-bottom:clamp(1.5rem,3vh,2.5rem);animation:up .6s .2s both;flex-wrap:wrap;justify-content:center}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.ring-svg{width:clamp(60px,10vw,72px);height:clamp(60px,10vw,72px);transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5}
.ring-prog{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:188;stroke-dashoffset:188;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.rp-d{stroke:#b4a8f8}.rp-h{stroke:#84d8f8}.rp-m{stroke:#84f8b4}.rp-s{stroke:#f8d484}
.ring-lbl{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.28)}
/* ELAPSED */
.elapsed{font-size:.75rem;color:rgba(255,255,255,.3);text-align:center;margin-bottom:1.5rem;font-family:'Bebas Neue',sans-serif;letter-spacing:.15em}
/* EDITOR */
.editor{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:clamp(1rem,3vw,1.5rem);width:100%;max-width:520px;margin-bottom:1.2rem;animation:up .6s .3s both}
.editor-title{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem}
.f-inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:'Barlow',sans-serif;font-size:.88rem;padding:.7rem 1rem;border-radius:10px;outline:none;transition:border-color .2s;width:100%}
.f-inp:focus{border-color:#b4a8f8}
.f-inp::placeholder{color:rgba(255,255,255,.25)}
.f-inp-full{grid-column:span 2}
.add-ev-btn{width:100%;background:linear-gradient(135deg,#6040ff,#a040ff);border:none;color:#fff;font-family:'Barlow',sans-serif;font-size:.85rem;font-weight:600;padding:.75rem;border-radius:10px;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.05em}
.add-ev-btn:hover{opacity:.85}
.add-ev-btn:active{transform:scale(.97)}
/* EVENTS LIST */
.events-wrap{width:100%;max-width:520px;animation:up .6s .4s both}
.events-title{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.7rem}
.events-grid{display:flex;gap:.45rem;flex-wrap:wrap}
.ev-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:'Barlow',sans-serif;font-size:.75rem;padding:.4rem .9rem;border-radius:100px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.5rem;font-weight:500}
.ev-chip:hover{background:rgba(180,168,248,.15);color:#b4a8f8;border-color:#b4a8f8}
.ev-chip.on{background:rgba(180,168,248,.2);color:#b4a8f8;border-color:#b4a8f8}
.ev-chip-del{font-size:.8rem;opacity:.5;transition:opacity .2s}
.ev-chip:hover .ev-chip-del{opacity:1;color:#f87171}
/* EXPIRED */
.expired{display:none;text-align:center;animation:up .4s both}
.expired h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3rem);background:linear-gradient(135deg,#f8d484,#f8a484);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.expired p{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:.5rem}
/* SHARE */
.share-row{display:flex;gap:.6rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.share-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:'Barlow',sans-serif;font-size:.75rem;padding:.45rem 1rem;border-radius:100px;cursor:pointer;transition:all .2s;font-weight:500}
.share-btn:hover{background:rgba(180,168,248,.15);color:#b4a8f8;border-color:#b4a8f8}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
/* RESPONSIVE */
@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
  .f-inp-full{grid-column:span 1}
  .sep{display:none}
}
</style>
</head>
<body>

<div class="title-area">
  <div class="ev-label">Counting down to</div>
  <div class="ev-title" id="evTitle">New Year 2027</div>
  <div class="ev-date" id="evDateLbl"></div>
</div>

<div class="countdown" id="countdown">
  <div class="unit-wrap"><div class="unit-box"><div class="unit-val" id="uDays">000</div></div><div class="unit-lbl">Days</div></div>
  <div class="sep">:</div>
  <div class="unit-wrap"><div class="unit-box"><div class="unit-val" id="uHrs">00</div></div><div class="unit-lbl">Hours</div></div>
  <div class="sep">:</div>
  <div class="unit-wrap"><div class="unit-box"><div class="unit-val" id="uMins">00</div></div><div class="unit-lbl">Minutes</div></div>
  <div class="sep">:</div>
  <div class="unit-wrap"><div class="unit-box"><div class="unit-val" id="uSecs">00</div></div><div class="unit-lbl">Seconds</div></div>
</div>

<div class="rings">
  <div class="ring-item"><svg class="ring-svg" viewBox="0 0 70 70"><circle class="ring-track" cx="35" cy="35" r="30"/><circle class="ring-prog rp-d" id="rD" cx="35" cy="35" r="30"/></svg><span class="ring-lbl">Days</span></div>
  <div class="ring-item"><svg class="ring-svg" viewBox="0 0 70 70"><circle class="ring-track" cx="35" cy="35" r="30"/><circle class="ring-prog rp-h" id="rH" cx="35" cy="35" r="30"/></svg><span class="ring-lbl">Hours</span></div>
  <div class="ring-item"><svg class="ring-svg" viewBox="0 0 70 70"><circle class="ring-track" cx="35" cy="35" r="30"/><circle class="ring-prog rp-m" id="rM" cx="35" cy="35" r="30"/></svg><span class="ring-lbl">Minutes</span></div>
  <div class="ring-item"><svg class="ring-svg" viewBox="0 0 70 70"><circle class="ring-track" cx="35" cy="35" r="30"/><circle class="ring-prog rp-s" id="rS" cx="35" cy="35" r="30"/></svg><span class="ring-lbl">Seconds</span></div>
</div>

<div class="elapsed" id="elapsedLbl"></div>

<div class="expired" id="expired">
  <h2>🎉 Time has arrived!</h2>
  <p>This event is now in the past.</p>
</div>

<div class="editor">
  <div class="editor-title">Add New Event</div>
  <div class="form-row">
    <input class="f-inp f-inp-full" type="text" id="evName" placeholder="Event name (e.g. My Birthday)"/>
    <input class="f-inp" type="datetime-local" id="evDate"/>
    <input class="f-inp" type="text" id="evEmoji" placeholder="Emoji (optional)" maxlength="2"/>
  </div>
  <button class="add-ev-btn" onclick="addEvent()">+ Add Event</button>
</div>

<div class="events-wrap">
  <div class="events-title">Your Events</div>
  <div class="events-grid" id="eventsGrid"></div>
</div>

<div class="share-row">
  <button class="share-btn" onclick="copyLink()">📋 Copy Link</button>
  <button class="share-btn" onclick="shareTwitter()">𝕏 Share</button>
</div>

<script>
let events=JSON.parse(localStorage.getItem('epoch_evs')||'null')||[
  {name:'New Year 2027',date:'2027-01-01T00:00',emoji:'🎆'},
  {name:'Summer Solstice',date:'2026-06-21T12:00',emoji:'☀️'},
  {name:'Halloween',date:'2026-10-31T00:00',emoji:'🎃'},
  {name:'Christmas 2026',date:'2026-12-25T00:00',emoji:'🎄'},
];
let activeIdx=0,ticker;

function pad(n,len=2){return String(n).padStart(len,'0')}
function setRing(id,val,max){document.getElementById(id).style.strokeDashoffset=188*(1-Math.min(val,max)/max)}

function update(){
  const ev=events[activeIdx];if(!ev)return;
  const now=Date.now(),target=new Date(ev.date).getTime();
  const diff=target-now;
  const expired=document.getElementById('expired');
  if(diff<=0){
    document.getElementById('countdown').style.display='none';
    expired.style.display='block';
    setRing('rD',0,365);setRing('rH',0,24);setRing('rM',0,60);setRing('rS',0,60);
    return;
  }
  document.getElementById('countdown').style.display='flex';
  expired.style.display='none';
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('uDays').textContent=pad(d,3);
  document.getElementById('uHrs').textContent=pad(h);
  document.getElementById('uMins').textContent=pad(m);
  document.getElementById('uSecs').textContent=pad(s);
  setRing('rD',d%365,365);setRing('rH',h,24);setRing('rM',m,60);setRing('rS',s,60);
  // elapsed
  const elapsed=now-new Date(ev.date.replace('T',' ')).getTime()+diff+diff;
  const totalMs=now-(now-diff); // = diff ms ago from target
  document.getElementById('elapsedLbl').textContent=''; // clean
}

function loadEvent(idx){
  activeIdx=idx;
  const ev=events[idx];
  clearInterval(ticker);
  document.getElementById('evTitle').textContent=(ev.emoji||'')+(ev.emoji?' ':'')+ev.name;
  const d=new Date(ev.date);
  document.getElementById('evDateLbl').innerHTML=`<strong>${d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</strong>`;
  ticker=setInterval(update,400);
  update();
  renderEvents();
}

function addEvent(){
  const name=document.getElementById('evName').value.trim();
  const date=document.getElementById('evDate').value;
  const emoji=document.getElementById('evEmoji').value.trim();
  if(!name||!date)return;
  events.unshift({name,date,emoji});
  if(events.length>12)events.pop();
  localStorage.setItem('epoch_evs',JSON.stringify(events));
  document.getElementById('evName').value='';document.getElementById('evEmoji').value='';
  loadEvent(0);
}

function deleteEvent(i,e){
  e.stopPropagation();
  if(events.length<=1)return;
  events.splice(i,1);
  localStorage.setItem('epoch_evs',JSON.stringify(events));
  loadEvent(Math.min(activeIdx,events.length-1));
}

function renderEvents(){
  document.getElementById('eventsGrid').innerHTML=events.map((ev,i)=>`
    <button class="ev-chip${i===activeIdx?' on':''}" onclick="loadEvent(${i})">
      ${ev.emoji||'📅'} ${ev.name}
      <span class="ev-chip-del" onclick="deleteEvent(${i},event)">✕</span>
    </button>`).join('');
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).catch(()=>{});
  event.target.textContent='✓ Copied!';setTimeout(()=>event.target.textContent='📋 Copy Link',2000);
}
function shareTwitter(){
  const ev=events[activeIdx];
  window.open(`https://twitter.com/intent/tweet?text=Counting down to ${encodeURIComponent(ev.name)}!`,'_blank');
}

// Set min date
const now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
document.getElementById('evDate').min=now.toISOString().slice(0,16);

loadEvent(0);
</script>
</body>
</html>
